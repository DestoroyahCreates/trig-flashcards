<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trigonometry Flashcards</title>

<script id="MathJax-script" async 
src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js">
</script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
}

.container {
    text-align: center;
    width: 100%;
    max-width: 600px;
}

h1 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

.card {
    width: 100%;
    height: 520px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    padding: 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* QUESTION */
.flashcard-text {
    font-size: 1.8rem;
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    padding: 20px;
    border-radius: 15px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Divider */
.divider {
    height: 2px;
    background: rgba(255,255,255,0.3);
    margin: 25px 0;
    border-radius: 2px;
}

/* ANSWER */
.answer-text {
    font-size: 1.4rem;
    background: rgba(0, 0, 0, 0.25);
    padding: 20px;
    border-radius: 15px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
}

.answer-text.visible {
    opacity: 1;
    transform: translateY(0);
}

.buttons {
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s ease;
}

.show-btn {
    background-color: #00c9a7;
    color: white;
}

.show-btn:hover {
    background-color: #00a58c;
    transform: scale(1.05);
}

.next-btn {
    background-color: #ff6b6b;
    color: white;
}

.next-btn:hover {
    background-color: #e55050;
    transform: scale(1.05);
}

.toggle-btn {
    margin-top: 20px;
    background-color: #ffd93d;
    color: black;
}

.toggle-btn:hover {
    transform: scale(1.05);
}

/* FULL LIST PANEL */
.full-list {
    margin-top: 20px;
    max-height: 0;
    overflow: hidden;
    background: rgba(0,0,0,0.25);
    border-radius: 15px;
    transition: max-height 0.5s ease;
    padding: 0 20px;
}

.full-list.visible {
    max-height: 400px;
    padding: 20px;
    overflow-y: auto;
}

.identity-item {
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

@media (max-width: 500px) {
    .card {
        height: 480px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>TRIGONOMETRY FLASHCARDS</h1>

    <div class="card">
        <div>
            <div id="flashcard" class="flashcard-text"></div>
            <div class="divider"></div>
            <div id="answer" class="answer-text"></div>
        </div>

        <div class="buttons">
            <button onclick="showAnswer()" class="show-btn">Show Answer</button>
            <button onclick="nextanswer()" class="next-btn">Next</button>
        </div>
    </div>

    <button onclick="toggleList()" class="toggle-btn">
        Show All Formulas
    </button>

    <div id="fullList" class="full-list"></div>

</div>

<script src="main.js"></script>

</body>
</html>
